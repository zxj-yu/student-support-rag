name: Deploy to Cloud Run

# Manual trigger for now (Actions tab -> Deploy to Cloud Run -> Run workflow).
# Once GCP_SA_KEY / GCP_PROJECT_ID / QDRANT_URL are configured in GitHub
# Secrets, change this back to:
#   on:
#     push:
#       branches: [main]
on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: student-support-rag

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app tests evaluation

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars QDRANT_URL=${{ secrets.QDRANT_URL }} \
            --set-secrets QDRANT_API_KEY=qdrant-api-key:latest

      - name: Output service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)'
