<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Support Assistant</title>
  <style>
    :root { --bg: #0f1419; --panel: #1a2129; --accent: #4a9eff; --text: #e6edf3; --muted: #8b949e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid #2d333b; font-size: 18px; font-weight: 600; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; white-space: pre-wrap; line-height: 1.5; }
    .user { align-self: flex-end; background: var(--accent); color: #fff; }
    .bot { align-self: flex-start; background: var(--panel); border: 1px solid #2d333b; }
    .bot .sources { margin-top: 8px; font-size: 12px; color: var(--muted); }
    #inputbar { display: flex; gap: 8px; padding: 16px 24px; border-top: 1px solid #2d333b; }
    #q { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #2d333b; background: var(--panel); color: var(--text); font-size: 14px; }
    #send { padding: 12px 20px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    #send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>🎓 Student Support Assistant</header>
  <div id="chat"></div>
  <div id="inputbar">
    <input id="q" placeholder="Ask about courses, withdrawal, GPA..." autofocus />
    <button id="send">Send</button>
  </div>

  <script>
    const API = "http://localhost:8000";
    const chat = document.getElementById("chat");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");

    function addMsg(text, cls, sources) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      if (sources && sources.length) {
        const s = document.createElement("div");
        s.className = "sources";
        s.textContent = "Sources: " + sources.map(x => x.title + " (" + x.score + ")").join(", ");
        div.appendChild(s);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const question = input.value.trim();
      if (!question) return;
      addMsg(question, "user");
      input.value = "";
      sendBtn.disabled = true;
      try {
        const res = await fetch(API + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        addMsg(data.answer, "bot", data.sources);
      } catch (err) {
        addMsg("Error: " + err.message, "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  </script>
</body>
</html>
